server:
  port: 8080

spring:
  application:
    name: lingobot-backend
  config:
    import: classpath:api-config.yml
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  datasource:
    url: jdbc:postgresql://localhost:5432/lingobotdb
    driver-class-name: org.postgresql.Driver
    username: lingobot_user
    password: lingobot_password
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

security:
  rate-limit:
    max-login-attempts: 5
    max-register-attempts: 3
    lock-duration: 15m
    window-duration: 5m
    max-ip-requests-per-minute: 30
    max-user-requests-per-minute: 10
    account-lock-duration: 1h
    max-failed-attempts-before-lock: 10
    delay-on-failure-ms: 1000

logging:
  level:
    com.lingobot: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

llm:
  base-url: ${LLM_BASE_URL:https://openrouter.ai/api}
  api-key: ${LLM_API_KEY:${OPENROUTER_API_KEY:}}
  model: ${LLM_MODEL:qwen/qwen3.5-flash-02-23}
  audio-model: ${LLM_AUDIO_MODEL:xiaomi/mimo-v2-omni}
  temperature: ${LLM_TEMPERATURE:0.7}
  max-tokens: ${LLM_MAX_TOKENS:4096}
  timeout: ${LLM_TIMEOUT:120000}
  audio-enabled: ${LLM_AUDIO_ENABLED:true}

proxy:
  enabled: ${PROXY_ENABLED:false}
  host: ${PROXY_HOST:localhost}
  port: ${PROXY_PORT:7897}
