api:
  default-cost: 0.0

  endpoints:
    vocabulary:
      regenerate-card:
        path: /api/vocabulary/conversations/{conversationPublicId}/regenerate-at-position
        method: POST
        cost: 0.1
        description: 重新生成词汇卡

      update-meaning:
        path: /api/vocabulary/cards/{cardId}/meaning
        method: PUT
        cost: 0.1
        description: AI检查用户释义准确性

      analyze-sentence:
        path: /api/vocabulary/cards/{cardId}/analyze-sentence
        method: POST
        cost: 0.1
        description: AI分析用户翻译的英文句子

      generate-batch-cards:
        path: /api/vocabulary/conversations/{conversationPublicId}/generate-batch
        method: POST
        cost: 1
        description: 批量生成10张词汇卡

    user-vocabulary:
      ai-modify:
        path: /api/user-vocabulary/ai-modify
        method: POST
        cost: 0.05
        description: AI完善词汇卡信息

    context:
      compact:
        path: /api/context/compact/{conversationId}
        method: POST
        cost: 0.05
        description: AI压缩对话历史摘要
